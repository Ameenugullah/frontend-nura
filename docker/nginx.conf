server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"          always;
    add_header X-Content-Type-Options  "nosniff"             always;
    add_header Referrer-Policy         "strict-origin"       always;
    add_header Permissions-Policy      "camera=(), geolocation=(), microphone=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml application/font-woff2;

    # ── SPA routing (React Router) ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → PocketBase ────────────────────────────────────────────────
    location /api/pb/ {
        proxy_pass         http://backend:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── HTML: no cache (SPA must always get fresh index.html) ─────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # location /api/ { limit_req zone=api burst=10; }
}
