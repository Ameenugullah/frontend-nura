[build]
builder = "NIXPACKS"

[build.nixpacks]
# Explicitly set the build command so npm ci only runs once (not twice).
# The EBUSY error in the logs happens when nixpacks runs both an install
# step and then "npm ci && npm run build" — the second npm ci tries to
# rm node_modules/.cache while it is still open from the first run.
buildCmd = "npm run build"

[deploy]
startCmd = "npx serve dist -s -l $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
